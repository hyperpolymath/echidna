#
# ConceptNet 5.7 pre-fetched seeds for math/CS/proof vocabulary.
#
# Underscore-prefix filename `_conceptnet_seed.toml` signals: offline-cached
# secondary index, NOT a per-prover synonym table. Consumers may merge it
# with `_msc2020.toml` + `_wordnet_math.toml` via
# `SynonymTable::merge_external()`.
#
# Why pre-fetch?
#
# The runtime ConceptNet client (`src/rust/integrations/conceptnet.rs`)
# queries `https://api.conceptnet.io/related/c/en/<term>` lazily and depends
# on the network. The S5 verification gate runs offline; corpus indexers
# need deterministic synonyms. This file is the offline-resilient cache:
# pre-fetched edges for the ~200 highest-priority math/CS/proof concepts.
#
# Each entry's `aliases` are drawn from ConceptNet edges of these relations:
#   /r/Synonym         /r/RelatedTo (top 5 by weight)
#   /r/IsA             /r/SimilarTo
#   /r/PartOf          /r/HasA
#   /r/UsedFor         /r/CapableOf
#
# `tactic_class` reuses the ConceptNet top-level domain (math, cs, logic,
# proof, structure). `semantic_class` carries the canonical concept URI
# fragment (e.g. `theorem` for `/c/en/theorem`).
#
# Refresh policy: re-run `tools/conceptnet/refresh.sh` (TODO — see
# docs/CORPUS-ADAPTERS.md) when ConceptNet ships a major version.

# ============================================================
