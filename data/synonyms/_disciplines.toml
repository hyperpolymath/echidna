#
# TypeChecker disciplines cross-prover vocabulary index.
#
# Underscore-prefix filename `_disciplines.toml` signals: this is NOT a
# per-prover synonym table (those are unprefixed: lean4.toml, coq.toml,
# etc.). Instead it is a cross-prover *taxonomic* dictionary loaded as a
# SECONDARY index by `SynonymTable::with_disciplines()`, sibling to
# `_msc2020.toml`, `_wordnet_math.toml`, `_conceptnet_seed.toml`.
#
# Each `[[synonym]]` entry captures one of the 41 TypeChecker disciplines
# wired into the Echidna saturation pipeline (the "39" headline figure in
# the goal-spec under-counted; the enumerated list contains 41). The
# `aliases` are textual markers a practitioner would grep for, drawn from
# TypeLL `Sigma` parameter names, source-code keywords and operators, and
# theory-paper terminology.
#
# Schema:
#   canonical        — discipline slug (kebab-case).
#   aliases          — 5-12 textual markers (keywords, operators, theorist
#                      names, paper titles).
#   tactic_class     — discipline family. One of: polymorphism, subtyping,
#                      dependent, substructural, mutability, modal,
#                      effects, session, homotopy, resource.
#   semantic_class   — discipline slug (same as canonical) — cross-table
#                      join key.
#   notes            — one-line description with theory citation.

# ============================================================
