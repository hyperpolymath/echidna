# ---------------------------------------------------------------------------
# Linear integer arithmetic (omega тЖТ lia)
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "lia"
aliases      = ["omega"]
tactic_class = "arithmetic"
since        = "Coq 8.10"
notes        = """
`omega` was deprecated in Coq 8.10 and removed in 8.13.  All new
proofs must use `lia` (Linear Integer Arithmetic).  Variant tester
should auto-substitute `omega тЖТ lia` on Coq тЙе 8.10.
"""

[[synonym]]
canonical    = "lra"
aliases      = ["fourier", "psatz"]
tactic_class = "arithmetic"
notes        = """
Real linear arithmetic.  `lra` is the modern Coq name; `fourier` was
the original ssreflect tactic; `psatz` covers the polynomial case.
"""

# ---------------------------------------------------------------------------
# Reduction tactics
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "cbn"
aliases      = ["simpl", "compute", "vm_compute", "lazy"]
tactic_class = "reduction"
notes        = """
Reduction strength + strategy:
  `simpl`       тАФ smart head-reduction with heuristics (legacy).
  `cbn`         тАФ call-by-name, more predictable than `simpl`.
  `compute`     тАФ full reduction via the bytecode VM.
  `vm_compute`  тАФ compute, but produces an opaque proof (faster).
  `lazy`        тАФ call-by-need.
Prefer `cbn` for new proofs; switch to `compute`/`vm_compute` when
`cbn` is too slow.  WARN: `vm_compute` introduces a Reject-class
trust hit if used in proof bodies that affect kernel checking тАФ see
`axiom_tracker.rs`.
"""

# ---------------------------------------------------------------------------
# Application tactics
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "apply"
aliases      = ["eapply", "refine"]
tactic_class = "lemma"
notes        = """
`apply L`   тАФ unify L's conclusion with the goal, fail on residual evars.
`eapply L`  тАФ same, but defer evars (becomes new goals).
`refine L`  тАФ partial term construction; user supplies the term shape.
When `apply` fails with "Cannot find an instance for variable X",
try `eapply` first.
"""

# ---------------------------------------------------------------------------
# Automation
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "auto"
aliases      = ["eauto", "intuition", "tauto", "firstorder"]
tactic_class = "automation"
notes        = """
Increasing search-completeness:
  `auto`       тАФ search a hint database, no backtracking on evars.
  `eauto`      тАФ like auto but with `eapply`.
  `intuition` тАФ propositional intuitionistic search + auto leaves.
  `tauto`      тАФ pure propositional decision.
  `firstorder` тАФ first-order logic search.
Cascade in order; fail-fast tactics suit batch testing.
"""

# ---------------------------------------------------------------------------
# Induction
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "induction"
aliases      = ["elim", "destruct"]
tactic_class = "induction"
notes        = """
`induction x`     тАФ apply x's induction principle, with IH.
`elim x`          тАФ apply, no IH binding (legacy / SSReflect-adjacent).
`destruct x`      тАФ case-split, NO induction (constructors only).
Confusing `destruct` with `induction` is a common pitfall on
recursively-defined datatypes.
"""

# ---------------------------------------------------------------------------
# Combinators
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "now"
aliases      = ["solve", "easy"]
tactic_class = "combinator"
notes        = """
`now <tac>`   тАФ run tac; require it to fully close the goal.
`solve [t1 | t2]` тАФ try alternatives, require one to close.
`easy`        тАФ automation tactic comparable to mathlib's `decide`.
For "this should just work" finishing, `now (auto)` or `now lia` are
the canonical idioms.
"""

# ---------------------------------------------------------------------------
# Inversion / inductive case-split
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "inversion"
aliases      = ["inversion_clear", "dependent destruction"]
tactic_class = "case"
notes        = """
`inversion H`           тАФ split on an inductive hypothesis; keeps H.
`inversion_clear H`     тАФ same, but clear H from the context.
`dependent destruction` тАФ for dependent inductive types where plain
                          `inversion` produces a "Cannot solve a
                          unification problem" error.
Fall back to `dependent destruction` (from Coq.Program.Equality) when
inversion fails on dependently-typed indices.
"""

# ---------------------------------------------------------------------------
# Definition rewriting
# ---------------------------------------------------------------------------

[[synonym]]
canonical    = "unfold"
aliases      = ["change", "fold", "rewrite_strat"]
tactic_class = "reduction"
notes        = """
`unfold X`        тАФ replace X by its definition (recursively).
`change (...) with X` тАФ replace a specific term shape with X.
`fold X`          тАФ inverse of unfold (re-fold definitions).
When unfold loops or produces unwieldy goals, prefer `change` for
surgical control.
"""

# ---------------------------------------------------------------------------
# Well-foundedness (cross-prover semantic class)
# ---------------------------------------------------------------------------

[[synonym]]
canonical      = "well_founded"
aliases        = ["well_founded R", "Wf"]
tactic_class   = "wf-statement"
semantic_class = "well-foundedness"
notes          = """
`well_founded R` in `Coq.Init.Wf`: every chain in `R` is finite.
Same conceptual role as Agda's `WellFounded`, Lean's `WellFounded`,
and Idris 2's `WellFounded`.
"""

[[synonym]]
canonical      = "Acc"
aliases        = ["Acc R x", "accessible"]
tactic_class   = "wf-witness"
semantic_class = "accessibility"
notes          = """
`Acc R x` in `Coq.Init.Wf`: `x` is `R`-accessible.
"""

[[synonym]]
canonical      = "well_founded_induction"
aliases        = ["Fix", "Fix_F"]
tactic_class   = "wf-recursor"
semantic_class = "wf-induction"
notes          = """
The recursor derived from `well_founded`: prove `P x` from
`(forall y, R y x -> P y) -> P x`.
"""
