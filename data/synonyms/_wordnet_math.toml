#
# WordNet math-vocabulary seeds. Hand-selected synset bridges drawn from
# Princeton WordNet 3.1 noun + verb hierarchies for mathematical English.
#
# Underscore-prefix filename `_wordnet_math.toml` signals: secondary
# vocabulary index, NOT a per-prover synonym table. Consumers may merge
# it into per-prover `semantic_class` resolution to bridge prose tokens
# (e.g. NL theorem statements in ProofNet) to formal-prover canonical
# tactic / decl names.
#
# Selection criteria: every entry must (1) appear as a noun or verb in
# WordNet's math.* subhierarchy AND (2) be a token the corpus indexers
# / NL→formal alignment passes need to disambiguate. Excluded: pure
# logic / set-theoretic primitives already covered by per-prover TOMLs
# and `_msc2020.toml`.
#
# Schema matches the project's `[[synonym]]` convention. `canonical`
# is the WordNet lemma (lowercase, underscore-joined for multiword);
# `aliases` are the WordNet synonyms (sister lemmas in the same synset)
# plus formal-corpus naming variants encountered in mathlib4 / MML /
# AFP / set.mm in practice.

