#
# MSC2020 (Mathematics Subject Classification, 2020 revision) cross-prover
# dictionary. Maps MSC code prefixes to canonical math-topic names with
# common aliases drawn from prover-corpus naming conventions.
#
# Underscore-prefix filename `_msc2020.toml` signals: this is NOT a per-prover
# synonym table (those are unprefixed: lean4.toml, coq.toml, etc.). Instead
# it's a cross-prover *taxonomic* dictionary loaded as a SECONDARY index by
# `SynonymTable::with_msc2020()`. Consumers may merge it into per-prover
# `semantic_class` resolution to bridge corpus items across systems.
#
# Coverage scope: areas with strong formalisation activity. Heaviest density
# in 03 (Logic) and 68 (Computer Science / Automated reasoning), with
# representative entries from 11 (Number theory), 14 (Algebraic geometry),
# 18 (Category theory), 26 (Real functions), 28 (Measure theory), 46
# (Functional analysis), 54 (Topology), 55 (Algebraic topology), 60
# (Probability), 65 (Numerical analysis).
#
# Schema: `canonical` is the MSC code; `aliases` are common name fragments
# corpus indexers and tactic-suggestion engines see in the wild; `tactic_class`
# is reused as a coarse "MSC top section" tag; `semantic_class` is the
# cross-prover equivalence class name. Notes carry the MSC wording.

