# SPDX-License-Identifier: MPL-2.0
name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cause-B mitigation (#77): cancel superseded runs so stacked pushes
# to the same ref don't pile up identical jobs in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Build and Test
  # ============================================================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      # echidna#85: `flint`/`spark`/`chapel` are opt-in, system-library-
      # dependent features (libflint LGPL-3 / GNAT+libechidna_spark / Zig
      # FFI). build.rs gates their `-l...` link directives correctly, but
      # the bare runner has none of those libraries. Key distinction:
      # `clippy`/`doc`/`check` type-check and lint the cfg-gated code WITHOUT
      # invoking the linker, so `--all-features` is safe there and keeps full
      # lint/compile coverage of flint/spark/chapel. Only `cargo test` builds
      # a linked binary — so the two test steps drop to `--features verisim`
      # (the only pure-Rust optional feature; `live-provers ⊇ verisim`).
      # flint/spark/chapel test execution stays in their dedicated CI
      # (chapel-ci.yml, SPARK Theatre Gate, live-provers.yml).
      - name: Clippy lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --lib --features verisim

      - name: Run integration tests
        run: cargo test --test integration_tests --features verisim

      - name: Build release
        run: cargo build --release

  # ============================================================================
  # Security Audit
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit

  # ============================================================================
  # Code Coverage
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68 # v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage
        run: cargo tarpaulin --out xml --skip-clean

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          files: cobertura.xml
          fail_ci_if_error: false

  # ============================================================================
  # Documentation Build
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68 # v2

      - name: Build documentation
        run: cargo doc --no-deps --all-features   # echidna#85: doc doesn't link, --all-features safe
        env:
          RUSTDOCFLAGS: -D warnings

  # ============================================================================
  # Julia Integration (Optional)
  # ============================================================================
  julia-integration:
    name: Julia Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68 # v2

      - name: Setup Julia
        uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v2
        with:
          version: '1.10'

      - name: Cache Julia packages
        uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0

      - name: Install Julia dependencies
        run: |
          cd src/julia
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Start Julia test server
        run: |
          cd src/julia
          julia --project=. test_server.jl 8081 &
          sleep 10
          curl -s http://localhost:8081/health || exit 1

      - name: Run integration tests
        run: cargo test --test test_neural_integration -- --include-ignored

  # ============================================================================
  # MSRV Check
  # ============================================================================
  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: '1.85'

      - name: Cache Cargo
        uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68 # v2

      - name: Check MSRV
        run: cargo check --all-features   # echidna#85: check doesn't link, --all-features safe
