# SPDX-License-Identifier: PMPL-1.0-or-later
# governance.yml — single wrapper calling the shared estate governance bundle
# in hyperpolymath/standards instead of carrying per-repo copies.
#
# Replaces the per-repo governance scaffolding removed in the same commit:
#   quality.yml, guix-nix-policy.yml, npm-bun-blocker.yml, ts-blocker.yml,
#   security-policy.yml, rsr-antipattern.yml, wellknown-enforcement.yml,
#   workflow-linter.yml
#
# Load-bearing build/security workflows stay standalone in the repo
# (rust-ci, codeql, dependabot, release, scan/mirror/pages plumbing).

name: Governance

on:
  push:
    branches: [main, master]
  pull_request:
    # Cause-B mitigation (#77): was unscoped (fired on PRs to every
    # branch); narrowed to integration branches like the other gates.
    branches: [main, master]
  workflow_dispatch:

# Cause-B mitigation (#77): cancel superseded runs so stacked pushes
# to the same ref don't pile up identical jobs in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    uses: hyperpolymath/standards/.github/workflows/governance-reusable.yml@main
