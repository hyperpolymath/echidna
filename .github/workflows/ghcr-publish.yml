# SPDX-License-Identifier: MPL-2.0
name: Publish to GHCR

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:

# Cause-B mitigation (#77): de-duplicate stacked publish runs.
# cancel-in-progress is false — never abort an image publish in flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Install nerdctl and containerd
        run: |
          # Install containerd
          sudo apt-get update
          sudo apt-get install -y containerd
          sudo systemctl start containerd

          # Install nerdctl full (includes containerd, CNI plugins, buildkit)
          NERDCTL_VERSION=2.2.1
          curl -fsSL "https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-full-${NERDCTL_VERSION}-linux-amd64.tar.gz" -o /tmp/nerdctl.tar.gz
          sudo tar -xzf /tmp/nerdctl.tar.gz -C /usr/local
          sudo mkdir -p /opt/cni/bin
          sudo cp /usr/local/libexec/cni/* /opt/cni/bin/ 2>/dev/null || true

          # Start buildkitd daemon
          sudo /usr/local/bin/buildkitd &
          sleep 3

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo nerdctl login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build minimal image
        run: |
          sudo nerdctl build -f .containerization/Containerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          sudo nerdctl tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Build full image
        run: |
          sudo nerdctl build -f .containerization/Containerfile.full -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full .

      - name: Push images
        id: push
        run: |
          sudo nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          sudo nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          sudo nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full
          # nerdctl push has no --digestfile, so read the real sha256 of each
          # pushed image back from the registry with skopeo (pre-installed on
          # ubuntu-latest). The minimal (:sha/:latest) and :full images are
          # distinct artifacts, so each gets its own attestation.
          MIN_DIGEST="$(skopeo inspect --format '{{.Digest}}' \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }})"
          FULL_DIGEST="$(skopeo inspect --format '{{.Digest}}' \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:full)"
          echo "min_digest=$MIN_DIGEST" >> "$GITHUB_OUTPUT"
          echo "full_digest=$FULL_DIGEST" >> "$GITHUB_OUTPUT"

      # GitHub native artifact attestation (build provenance) for the pushed
      # images. Verify with:
      #   gh attest verify oci://ghcr.io/${{ github.repository }}:<tag> \
      #     --repo ${{ github.repository }}
      - name: Attest container provenance (minimal image)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.min_digest }}
          push-to-registry: true

      - name: Attest container provenance (full image)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.full_digest }}
          push-to-registry: true

      - name: Tag release version
        if: github.event_name == 'release'
        run: |
          VERSION=${{ github.event.release.tag_name }}
          sudo nerdctl tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          sudo nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
