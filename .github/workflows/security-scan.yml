# SPDX-License-Identifier: MPL-2.0

name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

# Cause-B mitigation (#77): cancel superseded runs so stacked pushes
# to the same ref don't pile up identical jobs in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    uses: hyperpolymath/panic-attack/.github/workflows/scan-and-report.yml@6693e01727aefdc01cbb5ddd728e9a510128f2a2 # main 2026-07-07 (skip dispatch without VERISIMDB_PAT)
    secrets:
      VERISIMDB_PAT: ${{ secrets.VERISIMDB_PAT }}
