# SPDX-License-Identifier: MPL-2.0

name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

# Cause-B mitigation (#77): cancel superseded runs so stacked pushes
# to the same ref don't pile up identical jobs in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    uses: hyperpolymath/panic-attack/.github/workflows/scan-and-report.yml@6a1feb26290ae16f7952fa0ff765a7b061bd50c8 # main 2026-05-20
    secrets:
      VERISIMDB_PAT: ${{ secrets.VERISIMDB_PAT }}
