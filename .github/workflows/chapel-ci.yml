# SPDX-License-Identifier: MPL-2.0
name: Chapel Accelerator CI

on:
  push:
    paths:
      - 'src/zig_ffi/**'
      - 'src/rust/proof_search.rs'
      - 'src/rust/dispatch.rs'
      - 'src/chapel/**'
      - 'Cargo.toml'
      - '.github/workflows/chapel-ci.yml'
  pull_request:
    paths:
      - 'src/zig_ffi/**'
      - 'src/rust/proof_search.rs'
      - 'src/rust/dispatch.rs'
      - 'src/chapel/**'
      - 'Cargo.toml'
      - '.github/workflows/chapel-ci.yml'

# Cause-B mitigation (#77): cancel superseded runs so stacked pushes
# to the same ref don't pile up identical jobs in the queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  # Job 1: Compile Chapel .chpl files into a shared library.
  # Marked continue-on-error: true pending #133 — the .chpl sources use
  # non-Chapel FFI syntax (`extern "C" { ... }` blocks, octal escapes)
  # that have never compiled. Job runs for visibility but doesn't fail
  # the workflow. Re-enable strict gating once #133's rewrite lands.
  chapel-build:
    name: Compile Chapel Metalayer
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Chapel
        run: |
          # Install Chapel from official apt repository
          curl -fsSL https://github.com/chapel-lang/chapel/releases/download/2.3.0/chapel-2.3.0-1.ubuntu24.amd64.deb \
            -o /tmp/chapel.deb
          sudo dpkg -i /tmp/chapel.deb || sudo apt-get install -f -y
          # Verify installation
          chpl --version

      - name: Compile Chapel proof search module
        run: |
          cd src/chapel
          chpl --library --dynamic \
            -o libechidna_chapel \
            chapel_ffi_exports.chpl parallel_proof_search.chpl
          ls -la libechidna_chapel*

      - name: Run Chapel standalone test
        run: |
          cd src/chapel
          chpl -o chapel_test parallel_proof_search.chpl
          # Run with verbose output, will show prover availability
          timeout 30 ./chapel_test --verbose=true || true

      - name: Upload Chapel library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: chapel-lib
          path: src/chapel/libechidna_chapel*

  # Job 2: Build and test Zig FFI bridge (always uses stubs).
  # Marked continue-on-error: true alongside chapel-build (#133) — the
  # Zig 0.13.0 toolchain pinned here is missing `addLibrary` on the
  # `Build` namespace that `src/zig_ffi/build.zig:23` calls. Either bump
  # to the Zig that ships `addLibrary` or migrate to the supported API;
  # tracked as part of #133's Chapel + FFI rehabilitation arc.
  zig-ffi:
    name: Build & Test Zig FFI Bridge
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0

      - name: Build Zig FFI library (with Chapel stubs)
        run: cd src/zig_ffi && zig build -Doptimize=ReleaseSafe

      - name: Run Zig FFI tests (stub mode)
        run: cd src/zig_ffi && zig build test

      - name: Upload FFI library artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: chapel-ffi-lib
          path: src/zig_ffi/zig-out/lib/

  # Job 3: Build Rust with chapel feature (links against Zig FFI stubs).
  # Marked continue-on-error: true alongside its needed dependency zig-ffi
  # (#133) — when the upstream Zig FFI build is allowed to fail, this job's
  # "Download FFI library" step has no artifact to consume and red-fires.
  # Re-enable strict gating once #133's Chapel + FFI rehabilitation lands.
  rust-chapel-feature:
    name: Rust Build with Chapel Feature
    runs-on: ubuntu-latest
    needs: zig-ffi
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Download FFI library
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: chapel-ffi-lib
          path: src/zig_ffi/zig-out/lib/

      - name: Build with chapel feature
        run: cargo build --features chapel

      - name: Test with chapel feature
        run: cargo test --features chapel -- proof_search

  # Job 4: Build Rust linking against the real Chapel library (no Zig stubs).
  # This is the integration signal for full L2 Chapel wiring.  Marked
  # continue-on-error: true until dispatch.rs routes to ChapelParallelSearch
  # by default and the full L2 sub-waves are complete.
  rust-chapel-real:
    name: Rust Build — Real Chapel Library (allow-fail)
    runs-on: ubuntu-latest
    needs: [chapel-build, zig-ffi]
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Chapel
        run: |
          curl -fsSL --max-time 300 \
            https://github.com/chapel-lang/chapel/releases/download/2.3.0/chapel-2.3.0-1.ubuntu24.amd64.deb \
            -o /tmp/chapel.deb
          sudo dpkg -i /tmp/chapel.deb || sudo apt-get install -f -y
          chpl --version

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.14.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Download real Chapel library
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: chapel-lib
          path: src/chapel/

      - name: Build Zig FFI without stubs (links against real Chapel)
        run: |
          cd src/zig_ffi
          zig build -Doptimize=ReleaseSafe -Dstubs=false

      - name: Build Rust with real Chapel library
        run: |
          export LD_LIBRARY_PATH="$PWD/src/chapel:$PWD/src/zig_ffi/zig-out/lib:${LD_LIBRARY_PATH:-}"
          cargo build --features chapel

      - name: Test Rust with real Chapel library
        run: |
          export LD_LIBRARY_PATH="$PWD/src/chapel:$PWD/src/zig_ffi/zig-out/lib:${LD_LIBRARY_PATH:-}"
          cargo test --features chapel -- proof_search
